
<style>
@import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
#app{font-family:'Geologica',sans-serif;background:#f0ebe1;display:flex;flex-direction:row;min-height:740px;overflow:hidden;}
#left{flex:0 0 250px;position:relative;display:flex;flex-direction:column;align-items:center;padding:14px 0 14px 6px;}
#earth-svg{width:228px;cursor:ns-resize;touch-action:none;}
#right{flex:1;padding:18px 16px 16px 12px;display:flex;flex-direction:column;gap:10px;min-width:0;overflow-y:auto;max-height:740px;}

.field-wrap{display:flex;flex-direction:column;gap:2px;}
.field-label{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:#b0a898;}
.editable{font-size:13px;color:#3a3228;padding:4px 7px;border-radius:7px;border:0.5px solid transparent;cursor:text;transition:all .15s;line-height:1.6;min-height:26px;word-break:break-word;}
.editable:hover{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);}
.editable:focus{outline:none;background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.18);}
.editable.title-field{font-size:26px;font-weight:600;line-height:1.1;padding:3px 7px;}
.editable.sub-field{font-size:12px;color:#9a8e82;font-weight:300;}
.editable.tag-field{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#b0a898;}

#stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-card{background:rgba(0,0,0,0.05);border-radius:9px;padding:7px 10px;border:0.5px solid rgba(0,0,0,0.07);}
.stat-card .slabel{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#b0a898;margin-bottom:2px;}
.stat-card .editable{font-size:13px;font-weight:500;padding:2px 4px;}

.photos-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.photo-box{
  background:rgba(0,0,0,0.05);border-radius:8px;
  border:1.5px dashed rgba(0,0,0,0.15);
  aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;position:relative;transition:all .2s;
  outline:none;
}
.photo-box:hover,.photo-box.drag-over{background:rgba(0,0,0,0.08);border-color:rgba(0,0,0,0.3);}
.photo-box.active-paste{border-color:#7ab870;background:rgba(122,184,112,0.08);box-shadow:0 0 0 2px rgba(122,184,112,0.3);}
.photo-box img{width:100%;height:100%;object-fit:cover;display:block;}
.ph-placeholder{text-align:center;color:#ccc;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;pointer-events:none;}
.ph-placeholder svg{opacity:0.45;}
.ph-placeholder .ph-hint{font-size:9px;color:#bbb;line-height:1.5;}
.photo-num{position:absolute;top:4px;left:5px;font-size:9px;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.32);padding:1px 6px;border-radius:3px;pointer-events:none;}
.ph-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.4);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;border:none;cursor:pointer;font-family:'Geologica',sans-serif;display:none;}
.photo-box:hover .ph-del{display:block;}

/* paste toast */
#paste-toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(50,40,30,0.85);color:#fff;font-size:12px;padding:7px 16px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:9999;white-space:nowrap;}
#paste-toast.show{opacity:1;}

.note-edit{width:100%;min-height:130px;background:rgba(0,0,0,0.04);border:0.5px solid rgba(0,0,0,0.13);border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.75;color:#3a3228;resize:vertical;font-family:'Geologica',sans-serif;}
.note-edit:focus{outline:none;background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.2);}

.divider{height:.5px;background:rgba(0,0,0,0.09);flex-shrink:0;}
.hint{font-size:9px;color:#ccc;text-align:right;margin-top:2px;}

#save-bar{display:flex;align-items:center;gap:7px;font-size:10px;color:#b0a898;margin-top:auto;padding-top:4px;}
#save-dot{width:6px;height:6px;border-radius:50%;background:#c8b89a;flex-shrink:0;transition:background .3s;}
#save-dot.saved{background:#7ab870;}
#save-dot.unsaved{background:#e09050;}
#save-btn{margin-left:auto;background:rgba(0,0,0,0.07);border:0.5px solid rgba(0,0,0,0.12);border-radius:7px;padding:4px 12px;font-size:11px;font-family:'Geologica',sans-serif;cursor:pointer;color:#3a3228;transition:background .15s;}
#save-btn:hover{background:rgba(0,0,0,0.12);}

#drag-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(80,60,40,0.4);pointer-events:none;display:flex;align-items:center;gap:5px;z-index:20;animation:fh 4s .5s forwards;}
@keyframes fh{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
.fade{animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pr{0%{r:5;opacity:.9}100%{r:13;opacity:0}}
.pr{animation:pr 1.4s ease-out infinite;}
</style>

<script>
const BOUNDS = [0,13,312,541,740];
const LAYERS = [
  {tag:'Layer 01 · Crust',      title:'지각', sub:'0 – 35 km',        color:'#4a6830', temp:'0 – 200°C',     thick:'35 km',          state:'고체',        density:'2.7 g/cm³',    pressure:'0 – 0.3 GPa', comp:'Si, Al, O', note:'- 지구의 겉부분으로 가장 얇은 층\n- 고체 상태\n- 여러가지 암석으로 구성\n- 대륙 지각(약 35km)과 해양 지각(5km)으로 구분'},
  {tag:'Layer 02 · Mantle',     title:'맨틀', sub:'35 – 2,900 km',    color:'#7a3818', temp:'200 – 3,700°C', thick:'2,865 km',        state:'고체/반고체', density:'3.3–5.6 g/cm³', pressure:'0.3–136 GPa', comp:'Mg, Si, Fe, O'},
  {tag:'Layer 03 · Outer Core', title:'외핵', sub:'2,900 – 5,100 km', color:'#a04400', temp:'3,700–5,000°C', thick:'2,200 km',        state:'액체',        density:'10.3 g/cm³',   pressure:'136–329 GPa', comp:'Fe + Ni + 경원소'},
  {tag:'Layer 04 · Inner Core', title:'내핵', sub:'5,100 – 6,370 km', color:'#801008', temp:'~5,000°C',      thick:'반지름 1,270 km', state:'고체',        density:'12.8 g/cm³',   pressure:'329–364 GPa', comp:'Fe + Ni'},
];
const STORAGE_KEY = 'earth_v6_data';

function initCache() {
  try {
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){
      const p=JSON.parse(s);
      if(Array.isArray(p)&&p.length===4&&p.every(l=>l&&typeof l.title==='string'&&l.title.length>0)){
        // 마이그레이션: 각 레이어의 note가 비어있으면 LAYERS 기본값으로 채움
        LAYERS.forEach((L,i)=>{ if(!p[i].note && L.note) p[i].note=L.note; });
        return p;
      }
    }
  } catch(e){}
  return LAYERS.map(L=>({...L, note: L.note||'', photo0:null,photo1:null}));
}
const cache = initCache();
let cur=null, dirty=false, activeSlot=0;

function getLayer(y){for(let i=0;i<BOUNDS.length-1;i++)if(y<BOUNDS[i+1])return i;return 3;}
function markDirty(){dirty=true;document.getElementById('save-dot').className='unsaved';document.getElementById('save-msg').textContent='저장되지 않은 변경사항';}
function markSaved(msg){dirty=false;document.getElementById('save-dot').className='saved';document.getElementById('save-msg').textContent=msg||('저장 완료 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));}

function showToast(msg){const t=document.getElementById('paste-toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function setActiveSlot(n){
  activeSlot=n;
  [0,1].forEach(i=>{
    const box=document.getElementById(`photo-box-${i}`);
    box.classList.toggle('active-paste', i===n);
  });
  document.getElementById(`photo-box-${n}`).focus();
}

function applyImage(n, dataUrl){
  cache[cur][`photo${n}`]=dataUrl;
  const img=document.getElementById(`ph-img-${n}`);
  img.src=dataUrl; img.style.display='block';
  document.getElementById(`ph-ph-${n}`).style.display='none';
  markDirty();
  showToast(`사진 ${n+1} 추가됨`);
}

function delPhoto(n){
  cache[cur][`photo${n}`]=null;
  document.getElementById(`ph-img-${n}`).style.display='none';
  document.getElementById(`ph-ph-${n}`).style.display='flex';
  markDirty();
}

// Drag & drop
function onDragOver(e,n){e.preventDefault();e.stopPropagation();document.getElementById(`photo-box-${n}`).classList.add('drag-over');}
function onDragLeave(n){document.getElementById(`photo-box-${n}`).classList.remove('drag-over');}
function onDrop(e,n){
  e.preventDefault(); e.stopPropagation();
  document.getElementById(`photo-box-${n}`).classList.remove('drag-over');
  const file=[...e.dataTransfer.files].find(f=>f.type.startsWith('image/'));
  if(!file){showToast('이미지 파일을 드롭해주세요');return;}
  const r=new FileReader();
  r.onload=ev=>applyImage(n,ev.target.result);
  r.readAsDataURL(file);
}

// Global paste handler
document.addEventListener('paste', e=>{
  // Don't intercept paste inside text fields
  const tag=document.activeElement?.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT') return;
  const active=document.activeElement;
  // If a photo box is focused, use that slot; else use activeSlot
  let slot=activeSlot;
  if(active&&active.classList.contains('photo-box')){
    slot=parseInt(active.id.split('-').pop());
  }
  const items=[...e.clipboardData.items];
  const imgItem=items.find(it=>it.type.startsWith('image/'));
  if(!imgItem){
    // Maybe it's a URL or file — ignore silently
    return;
  }
  e.preventDefault();
  const blob=imgItem.getAsFile();
  const r=new FileReader();
  r.onload=ev=>applyImage(slot,ev.target.result);
  r.readAsDataURL(blob);
});

// Keyboard shortcut: Ctrl+V while photo box focused
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='v'){
    const active=document.activeElement;
    if(active&&active.classList.contains('photo-box')){
      // paste event will fire naturally — nothing extra needed
    }
  }
});

function syncFromPanel(){
  const c=cache[cur];
  c.tag=document.getElementById('f-tag').innerText.trim();
  c.title=document.getElementById('f-title').innerText.trim();
  c.sub=document.getElementById('f-sub').innerText.trim();
  c.temp=document.getElementById('s-temp').innerText.trim();
  c.thick=document.getElementById('s-thick').innerText.trim();
  c.state=document.getElementById('s-state').innerText.trim();
  c.density=document.getElementById('s-density').innerText.trim();
  c.pressure=document.getElementById('s-pressure').innerText.trim();
  c.comp=document.getElementById('s-comp').innerText.trim();
  c.note=document.getElementById('note-edit').value;
}

function loadLayer(idx,anim){
  if(cur!==null) syncFromPanel(); cur=idx;
  const c=cache[idx];
  document.getElementById('f-tag').innerText=c.tag;
  document.getElementById('f-title').innerText=c.title;
  document.getElementById('f-title').style.color=LAYERS[idx].color;
  document.getElementById('f-sub').innerText=c.sub;
  document.getElementById('s-temp').innerText=c.temp;
  document.getElementById('s-thick').innerText=c.thick;
  document.getElementById('s-state').innerText=c.state;
  document.getElementById('s-density').innerText=c.density;
  document.getElementById('s-pressure').innerText=c.pressure;
  document.getElementById('s-comp').innerText=c.comp;
  document.getElementById('note-edit').value=c.note;
  for(let p=0;p<2;p++){
    const img=document.getElementById(`ph-img-${p}`);
    const ph=document.getElementById(`ph-ph-${p}`);
    if(c[`photo${p}`]){img.src=c[`photo${p}`];img.style.display='block';ph.style.display='none';}
    else{img.style.display='none';ph.style.display='flex';}
  }
  // Reset active slot highlight
  [0,1].forEach(i=>document.getElementById(`photo-box-${i}`).classList.remove('active-paste'));
  activeSlot=0;
  if(anim){const r=document.getElementById('right');r.classList.remove('fade');void r.offsetWidth;r.classList.add('fade');}
}

function saveAll(){
  syncFromPanel();
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(cache));markSaved();}
  catch(e){markSaved('세션 내 저장 완료');}
}

document.querySelectorAll('.editable').forEach(el=>el.addEventListener('input',markDirty));
document.getElementById('note-edit').addEventListener('input',markDirty);

// Probe drag
const svg=document.getElementById('earth-svg');
let drag=false,svgRect=null;
function getSvgY(cy){if(!svgRect)svgRect=svg.getBoundingClientRect();return Math.max(0,Math.min(739,(cy-svgRect.top)/svgRect.height*740));}
function moveProbe(y){
  const hw=Math.max(2,106*(740-y)/740);
  const x1=Math.max(8,114-hw),x2=Math.min(220,114+hw);
  document.getElementById('probe-h').setAttribute('y1',y);document.getElementById('probe-h').setAttribute('y2',y);
  document.getElementById('probe-h').setAttribute('x1',x1);document.getElementById('probe-h').setAttribute('x2',x2);
  document.getElementById('probe-dot').setAttribute('cy',y);document.getElementById('probe-pulse').setAttribute('cy',y);
  const idx=getLayer(y);if(idx!==cur)loadLayer(idx,true);
}
svg.addEventListener('mousedown',e=>{drag=true;svgRect=svg.getBoundingClientRect();moveProbe(getSvgY(e.clientY));document.getElementById('drag-hint').style.display='none';e.preventDefault();});
window.addEventListener('mousemove',e=>{if(drag)moveProbe(getSvgY(e.clientY));});
window.addEventListener('mouseup',()=>drag=false);
svg.addEventListener('touchstart',e=>{drag=true;svgRect=svg.getBoundingClientRect();moveProbe(getSvgY(e.touches[0].clientY));document.getElementById('drag-hint').style.display='none';e.preventDefault();},{passive:false});
window.addEventListener('touchmove',e=>{if(drag)moveProbe(getSvgY(e.touches[0].clientY));},{passive:false});
window.addEventListener('touchend',()=>drag=false);

const hasSaved=!!localStorage.getItem(STORAGE_KEY);
moveProbe(7); loadLayer(0,false);
if(hasSaved)markSaved('이전 저장 데이터 불러옴');
</script>
